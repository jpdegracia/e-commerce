<div class="flex min-h-[80vh] items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
  <div class="w-full max-w-md space-y-8 rounded-xl bg-white p-8 shadow-lg">
    
    <div class="text-center">
      <h2 class="text-3xl font-bold tracking-tight text-slate-800">Welcome Back</h2>
      <p class="mt-2 text-sm text-gray-600">Sign in to your Haven's Store account</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="mt-8 space-y-6">
      <div class="space-y-4">
        
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email" name="email" [(ngModel)]="loginCredentialsData.email" type="email" required 
            class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-2.5 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" 
            placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <div class="relative mt-1">
            <input id="password" name="password" [(ngModel)]="loginCredentialsData.password" 
              [type]="showPassword ? 'text' : 'password'" required 
              class="block w-full rounded-md border border-gray-300 pl-4 pr-10 py-2.5 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" 
              placeholder="••••••••">
            
            <button type="button" (click)="showPassword = !showPassword" 
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 cursor-pointer">
              <ng-icon [name]="showPassword ? 'faSolidEyeSlash' : 'faSolidEye'" class="text-lg"></ng-icon>
            </button>
          </div>
        </div>

      </div>

      <div class="flex items-center justify-between mt-4 mb-6">
        
        <div class="flex items-center gap-2">
          <input id="rememberMe" 
                 name="rememberMe" 
                 type="checkbox" 
                 class="h-4 w-4 rounded border-gray-300 text-orange-600 focus:ring-orange-500 transition-colors cursor-pointer">
          <label for="rememberMe" class="block text-sm text-gray-700 cursor-pointer select-none">
            Remember me
          </label>
        </div>

        <a routerLink="/forgot-password" 
           class="text-sm font-bold text-orange-600 hover:text-orange-500 transition-colors cursor-pointer">
          Forgot password?
        </a>
        
      </div>

      <div>
        <button type="submit" class="btn btn-solid flex w-full justify-center py-2.5 text-sm">
          Sign In
        </button>
      </div>
    </form>

    <p class="text-center text-sm text-gray-600">
      Don't have an account? 
      <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500 transition-colors underline cursor-pointer">Sign up here</a>
    </p>

  </div>
</div>
