<nav class="sticky top-0 z-50 w-full bg-orange-400 shadow-md">
  
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    
    <div class="nav-brand">
      <a routerLink="/" class="text-2xl font-bold text-slate-800 transition-colors hover:text-slate-600 uppercase">
        Haven's Store
      </a>
    </div>
    
    <div class="flex items-center gap-4">

      @if (!authService.isLoggedIn()) {
        
        <a routerLink="/login" class="btn btn-login">
          Login
        </a>

        <a routerLink="/register" class="btn btn-register">
          Sign Up
        </a>

      } @else {
        
        <div class="relative">
          
          <button (click)="isDropdownOpen = !isDropdownOpen" 
                  class="btn btn-profile">
            
            <ng-icon name="faSolidUser" class="text-sm text-slate-700"></ng-icon>
            
            <span class="font-semibold text-sm">My Account</span>
            
            <ng-icon name="faSolidChevronDown" 
                     class="text-xs ml-1 text-slate-600 transition-transform duration-300" 
                     [class.rotate-180]="isDropdownOpen">
            </ng-icon>
            
          </button>

          @if (isDropdownOpen) {
            <div class="absolute right-0 mt-3 w-48 rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 overflow-hidden origin-top-right animate-[slideIn_0.15s_ease-out]">
              <div class="py-1">
                <a routerLink="/profile" (click)="isDropdownOpen = false" class="block px-4 py-3 text-sm font-medium text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition-colors cursor-pointer border-b border-gray-50">
                  My Profile
                </a>
                <button (click)="onLogout()" class="block w-full text-left px-4 py-3 text-sm font-medium text-red-600 hover:bg-red-50 transition-colors cursor-pointer">
                  Logout
                </button>
              </div>
            </div>
          }
        </div>

      }

      <a routerLink="/cart" class="btn btn-ghost hover:bg-yellow-400" alt="Cart">
        <ng-icon name="faSolidCartShopping" class="text-lg"></ng-icon>
      </a>

    </div>
    
  </div>
</nav>
