<div class="flex min-h-[80vh] items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
  
  <div class="w-full max-w-md space-y-8 rounded-xl bg-white p-8 shadow-lg">
    
    <div class="text-center">
      <h2 class="text-3xl font-bold tracking-tight text-slate-800">Reset Password</h2>
      <p class="mt-2 text-sm text-gray-600">
        Enter your email and we'll send you a link to reset your password.
      </p>
    </div>

    <form class="mt-8 space-y-6">
      
      <div class="space-y-4">
        
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email" name="email" type="email" required 
            class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-2.5 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" 
            placeholder="you@example.com">
        </div>

      </div>

      <div>
        <button type="submit" class="btn btn-solid flex w-full justify-center py-2.5 text-sm">
          Send Reset Link
        </button>
      </div>

    </form>

    <div class="text-center text-sm text-gray-600 flex items-center justify-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      <a routerLink="/login" class="font-medium text-slate-800 hover:text-blue-600 transition-colors">
        Back to login
      </a>
    </div>

  </div>
</div>
