<div class="flex min-h-[80vh] items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
  
  <div class="w-full max-w-md space-y-8 rounded-xl bg-white p-8 shadow-lg">
    
    <div class="text-center">
      <h2 class="text-3xl font-bold tracking-tight text-slate-800">Create an Account</h2>
      <p class="mt-2 text-sm text-gray-600">
        Join Haven's Store today
      </p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="mt-8 space-y-6">
      
      <div class="space-y-4">
        
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
          <input id="name" name="name" [(ngModel)]="registerData.fullname" type="text" required 
            class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-2.5 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" 
            placeholder="John Doe">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email" name="email" [(ngModel)]="registerData.email" type="email" required 
            class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-2.5 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" 
            placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" name="password" [(ngModel)]="registerData.password" type="password" required 
            class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-2.5 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" 
            placeholder="••••••••">
        </div>

        <div>
          <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <input id="confirm-password" name="confirmPassword" [(ngModel)]="registerData.confirmPassword" type="password" required 
            class="mt-1 block w-full rounded-md border border-gray-300 px-4 py-2.5 text-gray-900 placeholder-gray-400 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm transition-colors" 
            placeholder="••••••••">
        </div>

      </div>

      <div>
        <button type="submit" class="btn btn-solid flex w-full justify-center py-2.5 text-sm">
          Create Account
        </button>
      </div>

    </form>

    <p class="text-center text-sm text-gray-600">
      Already have an account? 
      <a routerLink="/login" class="font-medium text-blue-600 hover:text-blue-500 transition-colors underline cursor-pointer">Sign in</a>
    </p>

  </div>
</div>
