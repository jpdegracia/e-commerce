<div class="flex h-screen bg-gray-50 font-sans">

  <aside class="w-64 bg-slate-900 text-white flex-col hidden md:flex">
    
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
      <h1 class="text-xl font-black tracking-wider text-orange-500">ADMIN<span class="text-white">PANEL</span></h1>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
      
      <a routerLink="/admin/dashboard" routerLinkActive="bg-orange-600 text-white" [routerLinkActiveOptions]="{exact: true}" 
         class="flex items-center px-4 py-3 text-sm font-medium text-slate-300 rounded-xl hover:bg-slate-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        Dashboard
      </a>

      <a routerLink="/admin/products" routerLinkActive="bg-orange-600 text-white"
         class="flex items-center px-4 py-3 text-sm font-medium text-slate-300 rounded-xl hover:bg-slate-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        Products
      </a>

      <a routerLink="/admin/orders" routerLinkActive="bg-orange-600 text-white"
         class="flex items-center px-4 py-3 text-sm font-medium text-slate-300 rounded-xl hover:bg-slate-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        Orders
      </a>

      <a routerLink="/admin/users" routerLinkActive="bg-orange-600 text-white"
         class="flex items-center px-4 py-3 text-sm font-medium text-slate-300 rounded-xl hover:bg-slate-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        Users
      </a>
    </nav>

    <div class="p-4 border-t border-slate-800">
      <button class="flex items-center w-full px-4 py-2 text-sm font-medium text-slate-400 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        Back to Store
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">
    
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shadow-sm z-10">
      <h2 class="text-xl font-semibold text-gray-800">Overview</h2>
      <div class="flex items-center space-x-4">
        <span class="text-sm font-medium text-gray-600">Admin User</span>
        <div class="h-8 w-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold">A</div>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-6 bg-gray-50 relative">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
